services:
  backend:
    build: ./backend
    container_name: cystar-backend
    restart: unless-stopped
    environment:
      - APP_ENV=development
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-please-change-32-bytes-min!!}
      - DATABASE_URL=sqlite:////app/data/cystar.db
      - CORS_ORIGINS=http://localhost:3000
      - PUBLIC_FRONTEND_URL=http://localhost:3000
    volumes:
      - cystar-data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 3s
      retries: 3

  frontend:
    build: ./frontend
    container_name: cystar-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  cystar-data:
